<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/tourena-icon.png" />
    <link rel="apple-touch-icon" href="/tourena-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tourena — Competitive gaming tournaments platform" />
    <title>Tourena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#7C3AED',
              accent: '#F59E0B',
              bg: '#0A0A0F',
              surface: '#12121A',
              surface2: '#1A1A2E',
              muted: '#9CA3AF',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      body { background-color: #0A0A0F; color: #ffffff; font-family: 'Inter', sans-serif; }
      .glow-purple { box-shadow: 0 0 20px rgba(124,58,237,0.4); }
      .glow-gold { box-shadow: 0 0 20px rgba(245,158,11,0.4); }
      .gradient-text { background: linear-gradient(135deg, #7C3AED, #F59E0B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
      .border-subtle { border-color: rgba(255,255,255,0.08); }
      ::-webkit-scrollbar { width: 6px; } 
      ::-webkit-scrollbar-track { background: #12121A; }
      ::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 3px; }
      @keyframes pulse-gold { 0%,100% { box-shadow: 0 0 10px rgba(245,158,11,0.4); } 50% { box-shadow: 0 0 25px rgba(245,158,11,0.8); } }
      .badge-pulse { animation: pulse-gold 2s infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
